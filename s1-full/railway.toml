[build]
builder = "nixpacks"
buildCommand = "npm install && pip install yt-dlp || pip3 install yt-dlp || curl -L https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp -o yt-dlp && chmod +x yt-dlp"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
